name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install -U pip hatch
          hatch build

      - name: Smoke test wheel
        run: |
          pip install dist/desmosmidi-*.whl
          python -c "
          from pathlib import Path
          from desmosmidi.render_html import _TPL
          assert (Path(_TPL) / 'player.html.j2').is_file()
          "
          pip install -e ".[dev]"
          python -m desmosmidi.fixtures_gen
          DESMOS_API_KEY=test-key desmosmidi build tests/fixtures/generated/c_major_chord.mid --out /tmp/smoke-out
          test -f /tmp/smoke-out/player.html

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
